name: pokemon_tcg

channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - scikit-learn
  - pytorch
  - tqdm
  - joblib
  - networkx
  - cryptography
  - pytest
  - jupyter
  - ipykernel
  - pip
  - pip:
      - kaggle
      - kaggle-environments   # local self-play / replay rendering: make("cabt")
      - anthropic             # Claude teacher agent
      - openai                # GPT teacher agent
      - ollama                # local open-model teacher agent
      - python-dotenv         # load API keys from .env
